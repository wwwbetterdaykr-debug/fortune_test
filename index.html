}

function getPD(n){const name=$('name'+n).value.trim(),year=$('year'+n).value,month=$('month'+n).value,day=$('day'+n).value,hour=$('hour'+n).value,g=gen[n];const pf=(mode==='compat')?(n===1?'첫 번째 사람의 ':'두 번째 사람의 '):'';if(!name)return{e:pf+'이름을 입력해주세요'};if(!year||!month||!day)return{e:pf+'생년월일을 선택해주세요'};if(!g)return{e:pf+'성별을 선택해주세요'};return{name,sY:+year,sM:+month,sD:+day,hour:hour?+hour:null,gender:g}}

function load(ic,cb){const ov=$('ld-ov'),bar=$('ld-bar'),sub=$('ld-s'),title=$('ld-t');ov.classList.add('show');title.textContent=ic?'궁합을 분석하고 있어요':'사주를 분석하고 있어요';const ms=ic?['두 사람의 기운을 읽는 중...','오행 궁합을 비교해요...','잠자리 케미를 계산해요...','거의 다 됐어요! ✨']:['네 기둥을 살펴보는 중...','음양의 기운을 읽어요...','성적 에너지를 분석해요...','거의 다 됐어요! ✨'];let p=0;const iv=setInterval(()=>{p+=Math.random()*22+12;if(p>100)p=100;bar.style.width=p+'%';sub.textContent=ms[Math.min(Math.floor(p/25),ms.length-1)];if(p>=100){clearInterval(iv);setTimeout(()=>{ov.classList.remove('show');bar.style.width='0%';cb()},500)}},420)}

function elCC(e){return{'목':'el-c-wood','화':'el-c-fire','토':'el-c-earth','금':'el-c-metal','수':'el-c-water'}[e]||''}
function buildTable(pil){const cols=[];if(pil.hour)cols.push({l:'시주',s:pil.hour.s,b:pil.hour.b});cols.push({l:'일주',s:pil.day.s,b:pil.day.b},{l:'월주',s:pil.month.s,b:pil.month.b},{l:'년주',s:pil.year.s,b:pil.year.b});return`<div class="saju-table${pil.hour?'':' no-hour'}">${cols.map(c=>`<div class="sj-col"><div class="sj-header">${c.l}</div><div class="sj-stem"><div class="sj-hanja ${elCC(FM[c.s])}">${HJ_S[c.s]}</div><div class="sj-hangul">${c.s}(${FM[c.s]})</div></div><div class="sj-branch"><div class="sj-hanja ${elCC(BM[c.b])}">${HJ_B[c.b]}</div><div class="sj-hangul">${c.b}(${BM[c.b]})</div></div></div>`).join('')}</div>`}
function buildOH(ec){const order=['목','화','토','금','수'];const emojis={'목':'🌳','화':'🔥','토':'⛰️','금':'⚡','수':'💧'};const mx=Math.max(...Object.values(ec));return`<div class="oh-summary">${order.map(k=>{const d=Math.round(ec[k]*10)/10;return`<div class="oh-s-item"><span class="oh-s-emoji">${emojis[k]}</span><span class="oh-s-name">${k}</span><span class="oh-s-cnt${ec[k]===0?' cnt-0':ec[k]===mx?' cnt-hi':''}">${d}</span></div>`}).join('')}</div>`}

async function captureShareCard(){
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:0;top:0;z-index:-1;opacity:1;pointer-events:none';
  wrap.innerHTML=_lastResult.mode==='saju'?buildShareCardSaju():buildShareCardCompat();
  document.body.appendChild(wrap);
  // wait for logo image to load
  const imgs=wrap.querySelectorAll('img');
  await Promise.all([...imgs].map(img=>new Promise(r=>{if(img.complete)r();else{img.onload=r;img.onerror=r}})));
  await new Promise(r=>setTimeout(r,300));
  document.documentElement.classList.add('capturing');
  const card=wrap.firstElementChild;
  try{
    return await html2canvas(card,{backgroundColor:null,scale:5,useCORS:true,logging:false,allowTaint:true,width:360,height:640});
  }finally{
    document.documentElement.classList.remove('capturing');
    document.body.removeChild(wrap);
  }
}

async function doNativeShare(){
  if(!_lastResult)return;
  toast('이미지 만드는 중...');
  const shareUrl=getShareUrl();
  const shareText=_lastResult.mode==='saju'
    ?`🫣 ${_lastResult.p.name}님의 잠자리 유형: ${_lastResult.r.type.nm} ${_lastResult.r.type.emoji}\n내 상세 결과 보기 👉 ${shareUrl}`
    :`🫣 ${_lastResult.p1.name} × ${_lastResult.p2.name} 잠자리 궁합: ${_lastResult.r.ov}점!\n상세 결과 보기 👉 ${shareUrl}`;
  try{
    const canvas=await captureShareCard();
    const blob=await new Promise(r=>canvas.toBlob(r,'image/png',1.0));
    if(!blob){toast('이미지 생성 실패');return}
    const file=new File([blob],'19yas-saju.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{await navigator.share({files:[file],title:'🫣 19금 사주풀이',text:shareText})}catch(e){if(e.name==='AbortError')return;fallbackSave(blob)}
    }else if(navigator.share){
      try{await navigator.share({title:'🫣 19금 사주풀이',text:shareText,url:shareUrl})}catch(e){if(e.name==='AbortError')return;fallbackSave(blob)}
    }else{fallbackSave(blob)}
  }catch(e){toast('공유 실패 — 스크린샷을 이용해주세요')}
}

function fallbackSave(blob){
  const u=URL.createObjectURL(blob),a=document.createElement('a');
  a.download='19yas-saju.png';a.href=u;document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(u),1e3);toast('이미지가 저장되었어요 📸');
}

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.classList.remove('show'),2500)}
</script>
